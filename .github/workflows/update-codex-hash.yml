name: Update Nix upstream hashes

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-nix-upstream-hashes
  cancel-in-progress: false

jobs:
  update-hash:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NIX_CONFIG: experimental-features = nix-command flakes
      CACHIX_CACHE_NAME: codex-desktop-linux
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: cachix/install-nix-action@v31

      - name: Configure Cachix for hash refresh builds
        if: env.CACHIX_AUTH_TOKEN != ''
        uses: cachix/cachix-action@v17
        with:
          name: ${{ env.CACHIX_CACHE_NAME }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      - name: Install validation dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Refresh Nix upstream hash
        run: scripts/ci/update-nix-hashes.sh

      - name: Commit refreshed hashes
        run: |
          set -euo pipefail

          if git diff --quiet -- flake.nix; then
            echo "Nix hashes unchanged, nothing to do."
            exit 0
          fi

          CODEX_DMG_HASH="$(scripts/ci/update-nix-hashes.sh read-flake-hash 'codexDmg = pkgs.fetchurl {' 'hash = ')"

          git config user.name  "codex-dmg-hash-bot"
          git config user.email "actions@github.com"
          git add flake.nix
          git commit \
            -m "fix(nix): update upstream Nix hashes" \
            -m "Refreshed Codex.dmg SRI hash to $CODEX_DMG_HASH." \
            -m "Verified all Codex Desktop Nix package outputs against the refreshed DMG." \
            -m "[skip ci]"
          git push origin main
